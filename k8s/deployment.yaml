apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-manager
  namespace: inventory-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-manager
  template:
    metadata:
      labels:
        app: inventory-manager
    spec:
      containers:
        - name: inventory-manager
          image: ghcr.io/RyderDProgrammer/Inventory-Manager:sha-92cc1cb
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inventory-manager-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
